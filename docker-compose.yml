services:
  db-create:
    image: postgres:17
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PGPASSWORD: securepassword123
    command: >-
      sh -c "psql -h host.docker.internal -p 15432 -U postgres -tc
      \"SELECT 1 FROM pg_database WHERE datname='grid'\" | grep -q 1
      || createdb -h host.docker.internal -p 15432 -U postgres grid"

  migrate:
    build:
      context: ./
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file:
      - path: .env
        required: false
    depends_on:
      db-create:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Runs once and exits — api waits for it to complete successfully

  api:
    build:
      context: ./
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8015:8015"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "keycloak.celine.localhost:host-gateway"
      - "api.celine.localhost:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
